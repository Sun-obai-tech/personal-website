<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let x = 100;
let y = 0;
let score = 0;

function draw(){

    ctx.clearRect(0,0,300,600);

    ctx.font = "20px Arial";
    ctx.fillStyle = "black";
    ctx.fillText("Score: " + score,10,30);

    ctx.fillStyle = "blue";
    ctx.fillRect(x,y,30,30);

    if(y < 570){
        y++;
        score++;
    }

}

document.addEventListener("keydown", function(event){

    if(event.key === "a"){
        x -= 20;
    }

    if(event.key === "d"){
        x += 20;
    }

    if(event.key === "r"){
        x = 100;
        y = 0;
        score = 0;
    }

});

setInterval(draw,20);

</script>
